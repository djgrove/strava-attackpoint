<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>strava-ap — Authorizing...</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 500px; margin: 80px auto; padding: 0 20px; color: #333; text-align: center; }
    .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #ddd; border-top-color: #fc4c02; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #d32f2f; }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <p id="status">Exchanging authorization code...</p>

  <script>
    const PROXY_URL = "https://m28wz39mbc.execute-api.us-west-2.amazonaws.com";

    (async () => {
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");
      const error = params.get("error");

      if (error) {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("status").innerHTML = `<span class="error">Authorization denied: ${error}</span>`;
        return;
      }

      if (!code) {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("status").innerHTML = `<span class="error">No authorization code received.</span>`;
        return;
      }

      try {
        const resp = await fetch(`${PROXY_URL}/token`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code, grant_type: "authorization_code" }),
        });

        const data = await resp.json();

        if (data.access_token) {
          sessionStorage.setItem("strava_access_token", data.access_token);
          sessionStorage.setItem("strava_refresh_token", data.refresh_token);
          if (data.expires_at) sessionStorage.setItem("strava_token_expires_at", String(data.expires_at));
          if (data.athlete && data.athlete.id) sessionStorage.setItem("strava_athlete_id", String(data.athlete.id));
          window.location.href = "index.html";
        } else {
          throw new Error(data.message || "Token exchange failed");
        }
      } catch (err) {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("status").innerHTML = `<span class="error">Error: ${err.message}</span>`;
      }
    })();
  </script>
</body>
</html>
